name: BioTrack CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-node-version: 18
        cache: 'npm'

    - name: Install Monorepo Root Dependencies
      run: npm install

    - name: Run Build and Compilation Verification
      run: |
        npm run install:all
        npm run build --prefix frontend
